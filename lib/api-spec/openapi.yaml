openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Cinderella Team - Marketing Team Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: products
    description: Product management
  - name: orders
    description: Order management
  - name: stats
    description: Statistics and reports
  - name: notifications
    description: Notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List all marketers (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a marketer (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get marketer stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketerStats"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: List orders (admin sees all, marketer sees own)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: marketerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: province
          in: query
          schema:
            type: ["string", "null"]
        - name: productId
          in: query
          schema:
            type: ["integer", "null"]
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Change order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/marketer:
    get:
      operationId: getMarketerDashboard
      tags: [stats]
      summary: Get marketer dashboard stats (for the current user)
      responses:
        "200":
          description: Marketer dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketerDashboard"

  /stats/reports:
    get:
      operationId: getReports
      tags: [stats]
      summary: Get reports data
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly, yearly]
        - name: type
          in: query
          schema:
            type: string
            enum: [profits, commissions, orders]
      responses:
        "200":
          description: Report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportData"

  /stats/chart:
    get:
      operationId: getChartData
      tags: [stats]
      summary: Get chart data for orders by day/month
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, monthly]
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, name, role, commissionRate, balance, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, marketer]
        commissionRate:
          type: number
        balance:
          type: number
        totalOrders:
          type: ["integer", "null"]
        deliveredOrders:
          type: ["integer", "null"]
        cancelledOrders:
          type: ["integer", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [username, name, password, commissionRate]
      properties:
        username:
          type: string
        name:
          type: string
        password:
          type: string
        commissionRate:
          type: number
          minimum: 0
          maximum: 100

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        password:
          type: ["string", "null"]
        commissionRate:
          type: number
          minimum: 0
          maximum: 100

    Product:
      type: object
      required: [id, name, price, profit, quantity, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        image:
          type: ["string", "null"]
        price:
          type: number
        profit:
          type: number
        quantity:
          type: integer
        status:
          type: string
          enum: [active, inactive]
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [name, price, profit, quantity]
      properties:
        name:
          type: string
        image:
          type: ["string", "null"]
        price:
          type: number
        profit:
          type: number
        quantity:
          type: integer
        status:
          type: string
          enum: [active, inactive]
        description:
          type: ["string", "null"]

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        image:
          type: ["string", "null"]
        price:
          type: number
        profit:
          type: number
        quantity:
          type: integer
        status:
          type: string
          enum: [active, inactive]
        description:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, orderNumber, customerName, phone, productId, quantity, salePrice, status, marketerId, createdAt, updatedAt]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        customerName:
          type: string
        phone:
          type: string
        province:
          type: ["string", "null"]
        district:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        productId:
          type: integer
        productName:
          type: ["string", "null"]
        quantity:
          type: integer
        salePrice:
          type: number
        paymentMethod:
          type: ["string", "null"]
        deliveryCompany:
          type: ["string", "null"]
        trackingNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        marketerId:
          type: integer
        marketerName:
          type: ["string", "null"]
        status:
          type: string
          enum: [new, confirmed, preparing, shipped, delivering, delivered, cancelled, returned]
        marketerProfit:
          type: ["number", "null"]
        companyProfit:
          type: ["number", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    OrderInput:
      type: object
      required: [customerName, phone, productId, quantity, salePrice]
      properties:
        customerName:
          type: string
        phone:
          type: string
        province:
          type: ["string", "null"]
        district:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        productId:
          type: integer
        quantity:
          type: integer
        salePrice:
          type: number
        paymentMethod:
          type: ["string", "null"]
        deliveryCompany:
          type: ["string", "null"]
        trackingNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    OrderUpdate:
      type: object
      properties:
        customerName:
          type: string
        phone:
          type: string
        province:
          type: ["string", "null"]
        district:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        productId:
          type: integer
        quantity:
          type: integer
        salePrice:
          type: number
        paymentMethod:
          type: ["string", "null"]
        deliveryCompany:
          type: ["string", "null"]
        trackingNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, confirmed, preparing, shipped, delivering, delivered, cancelled, returned]

    DashboardStats:
      type: object
      required: [todayOrders, monthOrders, totalProfit, totalMarketers, totalProducts, newOrders, deliveredOrders, cancelledOrders]
      properties:
        todayOrders:
          type: integer
        monthOrders:
          type: integer
        totalProfit:
          type: number
        totalMarketers:
          type: integer
        totalProducts:
          type: integer
        newOrders:
          type: integer
        deliveredOrders:
          type: integer
        cancelledOrders:
          type: integer
        topMarketers:
          type: array
          items:
            $ref: "#/components/schemas/MarketerStats"
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/ProductStats"

    MarketerDashboard:
      type: object
      required: [totalOrders, deliveredOrders, newOrders, cancelledOrders, totalProfit, totalCommission]
      properties:
        totalOrders:
          type: integer
        deliveredOrders:
          type: integer
        newOrders:
          type: integer
        cancelledOrders:
          type: integer
        totalProfit:
          type: number
        totalCommission:
          type: number
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"

    MarketerStats:
      type: object
      required: [id, name, totalOrders, deliveredOrders, totalProfit, commissionRate, balance]
      properties:
        id:
          type: integer
        name:
          type: string
        totalOrders:
          type: integer
        deliveredOrders:
          type: integer
        cancelledOrders:
          type: integer
        totalProfit:
          type: number
        commissionRate:
          type: number
        balance:
          type: number

    ProductStats:
      type: object
      required: [id, name, totalSold, totalRevenue]
      properties:
        id:
          type: integer
        name:
          type: string
        totalSold:
          type: integer
        totalRevenue:
          type: number

    ReportData:
      type: object
      required: [period, totalOrders, deliveredOrders, cancelledOrders, totalRevenue, totalProfit, totalCommissions]
      properties:
        period:
          type: string
        totalOrders:
          type: integer
        deliveredOrders:
          type: integer
        cancelledOrders:
          type: integer
        totalRevenue:
          type: number
        totalProfit:
          type: number
        totalCommissions:
          type: number
        bestMarketer:
          type: ["string", "null"]
        bestProduct:
          type: ["string", "null"]
        bestProvince:
          type: ["string", "null"]
        chartData:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"

    ChartDataPoint:
      type: object
      required: [label, orders, profit]
      properties:
        label:
          type: string
        orders:
          type: integer
        profit:
          type: number
        commissions:
          type: number

    Notification:
      type: object
      required: [id, userId, type, message, read, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [new_order, status_change, commission, new_product]
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
